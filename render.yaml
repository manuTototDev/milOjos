services:
  - type: web
    name: milojos-api
    runtime: python
    region: oregon
    rootDir: Web/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATA_DIR
        value: "/data"
    disk:
      name: milojos-data
      mountPath: /data
      sizeGB: 10
